<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>픽견적 관리자</title>
    <meta name="description" content="픽견적 판매자 승인, 반려, 알림톡 발송을 관리하는 관리자 페이지입니다." />
    <link rel="stylesheet" href="admin.css" />
    <script defer src="admin.js"></script>
  </head>
  <body>
    <aside class="sidebar">
      <a class="brand" href="#sellerReview" aria-label="픽견적 관리자 홈">
        <span class="brand-mark">픽</span>
        <span>
          픽견적
          <small>관리자 콘솔</small>
        </span>
      </a>
      <nav class="side-nav" aria-label="관리자 메뉴">
        <span class="nav-label">업무 메뉴</span>
        <a href="#sellerReview">판매자 승인</a>
        <a href="#alimtalkControl">알림톡 발송</a>
        <a href="#approvedSellers">승인 판매자</a>
      </nav>
      <a class="home-link" href="/">서비스 화면으로</a>
    </aside>

    <main class="admin-shell">
      <header class="admin-header">
        <div>
          <p class="eyebrow">Back office</p>
          <h1>판매자 승인과 알림톡 발송 관리</h1>
          <p class="header-copy">등록 신청을 검토하고 승인, 반려, 안내 발송까지 한 화면에서 처리합니다.</p>
        </div>
        <div class="admin-actions">
          <button class="ghost-btn" id="seedDemoBtn" type="button">데모 신청 추가</button>
          <button class="primary-btn" id="refreshBtn" type="button">새로고침</button>
        </div>
      </header>

      <section class="stat-grid" id="statGrid" aria-label="관리 현황"></section>

      <section class="workspace" id="sellerReview">
        <section class="panel queue-panel">
          <div class="panel-head">
            <div>
              <p class="eyebrow">Seller review</p>
              <h2>판매자 등록 신청</h2>
            </div>
            <div class="segmented" aria-label="신청 상태 필터">
              <button class="is-active" type="button" data-application-filter="pending">대기</button>
              <button type="button" data-application-filter="approved">승인</button>
              <button type="button" data-application-filter="rejected">반려</button>
              <button type="button" data-application-filter="all">전체</button>
            </div>
          </div>
          <label class="search-box">
            신청 검색
            <input id="applicationSearch" type="search" placeholder="지점, 매니저, 아이디, 연락처" />
          </label>
          <div class="application-list" id="applicationList"></div>
        </section>

        <aside class="panel detail-panel" id="applicationDetail"></aside>
      </section>

      <section class="grid-two">
        <section class="panel" id="alimtalkControl">
          <div class="panel-head">
            <div>
              <p class="eyebrow">Alimtalk</p>
              <h2>알림톡 발송 큐</h2>
            </div>
            <div class="segmented" aria-label="알림톡 상태 필터">
              <button class="is-active" type="button" data-message-filter="ready">대기</button>
              <button type="button" data-message-filter="sent">발송완료</button>
              <button type="button" data-message-filter="all">전체</button>
            </div>
          </div>
          <div class="message-list" id="messageList"></div>
        </section>

        <section class="panel" id="approvedSellers">
          <div class="panel-head">
            <div>
              <p class="eyebrow">Approved sellers</p>
              <h2>승인 판매자</h2>
            </div>
          </div>
          <div class="seller-table-wrap">
            <table>
              <thead>
                <tr>
                  <th>판매자</th>
                  <th>매니저</th>
                  <th>지역</th>
                  <th>아이디</th>
                </tr>
              </thead>
              <tbody id="approvedSellerRows"></tbody>
            </table>
          </div>
        </section>
      </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>
  </body>
</html>
